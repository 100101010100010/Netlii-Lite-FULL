<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>NETLII | Settings</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-color: #1a1a1a;
            --container-bg: rgba(255, 255, 255, 0.5);
            --body-bg: #f4f4f4;
            --bg-image: url('netlii-bg.avif');
            --accent: #000;
        }

        /* Dark Mode variables and background image */
        [data-theme="dark"] {
            --text-color: #ffffff;
            --container-bg: rgba(0, 0, 0, 0.6);
            --body-bg: #121212;
            --bg-image: url('netlii-bg 2.avif');
            --accent: #fff;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            background-color: var(--body-bg);
            background-image: var(--bg-image);
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* Theme Toggle Styling */
        .theme-switch-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(26px); }

        .mode-label {
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-color);
        }

        .header { margin-top: 40px; text-align: center; }
        .header h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 12px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-color);
        }

        .settings-scroll-area {
            width: 90%;
            max-width: 700px;
            margin: 20px 0 120px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-panel {
            background: var(--container-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: background 0.4s ease;
        }

        h2 { margin-top: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 0.9rem; line-height: 1.4; color: var(--text-color); opacity: 0.9; }

        input[type="url"], input[type="text"] {
            width: 100%;
            height: 3rem;
            border-radius: 50px;
            border: 2px solid var(--text-color);
            padding: 0 20px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        button {
            background-color: var(--text-color);
            color: var(--body-bg);
            border: 2px solid var(--text-color);
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        button:hover { background-color: transparent; color: var(--text-color); }

        .bottom-nav {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 40px;
            background: var(--container-bg);
            padding: 15px 40px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 800;
            transition: 0.2s;
        }

        .nav-item:hover { transform: translateY(-5px); }

        .circle {
            width: 45px;
            height: 45px;
            border: 2px solid var(--text-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 5px;
            background: white;
        }
    </style>
</head>
<body>

    <div class="theme-switch-wrapper">
        <span class="mode-label">Dark Mode</span>
        <label class="switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="header">
        <h1>NETLII</h1>
    </div>

    <div class="settings-scroll-area">
        <div class="glass-panel">
            <h2>About:Blank Proxy</h2>
            <p>Enter a URL to open in a proxied about:blank page:</p>
            <input id="url-target" type="url" placeholder="https://website.com" />
            <button id="create">CREATE PAGE</button>
        </div>

        <div class="glass-panel">
            <h2>Tab Cloaker</h2>
            <p>Set a custom title or icon for the browser tab.</p>
            <input id="userinput" type="text" placeholder="New Title or Image URL" />
            <div class="button-group">
                <button onclick="changeTabTitle();">SET TITLE</button>
                <button onclick="changeTabIcon();">SET ICON</button>
                <button onclick="resetTabSettings();">RESET</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="./projects" class="nav-item"><div class="circle">🎮</div><span>GAMES</span></a>
        <a href="./apps" class="nav-item"><div class="circle">📱</div><span>APPS</span></a>
        <a href="./home" class="nav-item"><div class="circle">🏠</div><span>HOME</span></a>
        <a href="./movies/" class="nav-item"><div class="circle">🍿</div><span>MOVIES</span></a>
    </div>

    <script>
        // Theme Toggle Logic
        const toggleSwitch = document.querySelector('#theme-toggle');
        
        function switchTheme(e) {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }    
        }

        toggleSwitch.addEventListener('change', switchTheme, false);

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            if (currentTheme === 'dark') {
                toggleSwitch.checked = true;
            }
        }
    </script>
    <script src="/js/misc.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
