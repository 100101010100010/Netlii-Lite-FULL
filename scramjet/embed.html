<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed</title>
    <script src="../config.js"></script>
    <link rel="stylesheet" href="../style.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden;background:var(--bg,#0a0a0a);font-family:'Inter',system-ui,sans-serif}
        #iframe-container{width:100%;height:100%;position:absolute;top:0;left:0;transition:filter .5s ease;z-index:1;filter:blur(15px)}
        #iframe-container.loaded{filter:blur(0)}
        #embed-frame{width:100%;height:100%;border:none;background:transparent}
        .message-container{display:flex;align-items:center;justify-content:center;height:100%;width:100%;color:var(--text,#fff);text-align:center;position:fixed;top:0;left:0;z-index:10;background:rgba(10,10,10,.4);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:opacity .3s ease}
        .message-content{max-width:400px;padding:20px}
        .spinner{border:2px solid rgba(255,255,255,0.1);border-top-color:var(--accent,#007bff);border-radius:50%;width:32px;height:32px;animation:spin .8s linear infinite;margin:0 auto 20px}
        @keyframes spin{to{transform:rotate(360deg)}}
        #skip-btn{margin-top:20px;padding:8px 16px;background:transparent;color:var(--text-muted,#888);border:1px solid var(--border,#333);border-radius:6px;cursor:pointer;display:none}
    </style>

    <script src="https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js"></script>
    <script type="module">
        import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";
        window.BareMux = BareMux;
    </script>
</head>
<body>
    <div id="loading" class="message-container">
        <div class="message-content">
            <div class="spinner"></div>
            <h1 id="status-title">Connecting</h1>
            <p id="status-url">Initializing proxy engine...</p>
            <button id="skip-btn">View Anyway</button>
        </div>
    </div>

    <div id="iframe-container"></div>

    <script>
        const DEFAULT_WISP = window.SITE_CONFIG?.defaultWisp || "wss://wisp.mercurywork.shop";
        
        async function startProxy() {
            const loadingMsg = document.getElementById('status-url');
            const skipBtn = document.getElementById('skip-btn');
            const container = document.getElementById('iframe-container');
            const targetUrl = window.location.hash.substring(1);

            if (!targetUrl) {
                loadingMsg.textContent = "Error: No URL provided in hash (#https://example.com)";
                return;
            }

            try {
                const basePath = location.pathname.replace(/[^/]*$/, '');

                // 1. Register Service Worker
                loadingMsg.textContent = "Registering Service Worker...";
                const reg = await navigator.serviceWorker.register(basePath + 'sw.js', { scope: basePath });
                await navigator.serviceWorker.ready;

                // 2. Setup BareMux Connection
                loadingMsg.textContent = "Establishing WISP connection...";
                const wispUrl = localStorage.getItem("proxServer") || DEFAULT_WISP;
                const connection = new window.BareMux.BareMuxConnection(basePath + "bareworker.js");
                await connection.setTransport("https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@2.1.28/dist/index.mjs", [{ wisp: wispUrl }]);

                // 3. Initialize Scramjet
                loadingMsg.textContent = "Booting Scramjet...";
                const { ScramjetController } = $scramjetLoadController();
                const scramjet = new ScramjetController({
                    prefix: basePath + "scramjet/",
                    files: {
                        wasm: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.wasm.wasm",
                        all: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js",
                        sync: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.sync.js"
                    }
                });
                await scramjet.init();

                // 4. Create and Load Frame
                loadingMsg.textContent = "Loading " + targetUrl;
                const activeFrame = scramjet.createFrame();
                activeFrame.frame.id = 'embed-frame';
                container.appendChild(activeFrame.frame);

                // UI Logic
                const showFinal = () => {
                    document.getElementById('loading').style.display = 'none';
                    container.classList.add('loaded');
                };

                activeFrame.frame.addEventListener('load', showFinal);
                skipBtn.style.display = 'inline-block';
                skipBtn.onclick = showFinal;

                activeFrame.go(targetUrl);

            } catch (err) {
                console.error(err);
                loadingMsg.innerHTML = `<span style="color:#ff4444">Failed: ${err.message}</span>`;
            }
        }

        window.addEventListener('load', startProxy);
    </script>
</body>
</html>
