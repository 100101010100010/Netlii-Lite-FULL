<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Embed</title>
    
    <script src="https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js"></script>
    <script type="module">
        import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";
        window.BareMux = BareMux;
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #0a0a0a; color: white; font-family: sans-serif; overflow: hidden; }
        #loading {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #0a0a0a; z-index: 10;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #fff;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p id="status">Initializing Proxy...</p>
    </div>

    <div id="frame-container" style="width:100%; height:100%;"></div>

    <script>
        const status = document.getElementById('status');

        async function setup() {
            // 1. Get the URL from the hash (e.g., embed.html#https://google.com)
            const targetUrl = window.location.hash.substring(1);
            if (!targetUrl) {
                status.textContent = "Error: No URL provided in address hash.";
                return;
            }

            try {
                // 2. Wait for document to be fully interactive/complete to avoid "Invalid State"
                if (document.readyState === 'loading') {
                    await new Promise(r => window.addEventListener('DOMContentLoaded', r));
                }

                // 3. Register Service Worker
                status.textContent = "Registering Service Worker...";
                const registration = await navigator.serviceWorker.register('./sw.js', {
                    scope: './'
                });
                await navigator.serviceWorker.ready;

                // 4. Setup BareMux (Transport)
                status.textContent = "Connecting to WISP...";
                const connection = new window.BareMux.BareMuxConnection("./bareworker.js");
                await connection.setTransport("https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@2.1.28/dist/index.mjs", [{ wisp: "wss://wisp.mercurywork.shop/" }]);

                // 5. Initialize Scramjet
                status.textContent = "Booting Scramjet...";
                const { ScramjetController } = $scramjetLoadController();
                const scramjet = new ScramjetController({
                    prefix: "./scramjet/",
                    files: {
                        wasm: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.wasm.wasm",
                        all: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js",
                        sync: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.sync.js"
                    }
                });
                await scramjet.init();

                // 6. Create Frame and Load
                status.textContent = "Loading " + targetUrl;
                const activeFrame = scramjet.createFrame();
                document.getElementById('frame-container').appendChild(activeFrame.frame);
                
                activeFrame.frame.onload = () => {
                    document.getElementById('loading').style.display = 'none';
                };

                activeFrame.go(targetUrl);

            } catch (err) {
                console.error(err);
                status.style.color = "#ff4444";
                status.textContent = "Failed: " + err.message;
            }
        }

        // Start the engine
        setup();
    </script>
</body>
</html>
